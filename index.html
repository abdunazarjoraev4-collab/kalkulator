
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <input type="text" placeholder="0" id="outputscreen" readonly>
            <button class="yoqqilish" onclick="clearScreen()">C</button>
            <button  class="ochirish" onclick="del()">DEL</button>
            <button class="foiz" onclick="display('%')">%</button>
            <button class="bolish" onclick="display('/')">/</button>
            <button onclick="display('7')">7</button>
            <button onclick="display('8')">8</button>
            <button onclick="display('9')">9</button>
            <button class="copaytirish" onclick="display('*')">*</button>
            <button onclick="display('4')">4</button>
            <button onclick="display('5')">5</button>
            <button onclick="display('6')">6</button>
            <button class="minus" onclick="display('-')">-</button>
            <button onclick="display('1')">1</button>
            <button onclick="display('2')">2</button>
            <button onclick="display('3')">3</button>
            <button class="pilus" onclick="display('+')">+</button>
            <button onclick="display('0')">0</button>
            <button class="nuqta" onclick="display('.')">.</button>
            <button onclick="calculate()" class="equal">=</button>
        </div>  
    </div>
    <script>
        const outputscreen = document.getElementById("outputscreen");

        function display(num) {
            outputscreen.value += num;
        }

        function calculate() {
            try {
                let expr = outputscreen.value.replace(/%/g, '/100');
                outputscreen.value = eval(expr);
            } catch (err) {
                alert("Invalid Expression");
            }
        }

        function clearScreen() {
            outputscreen.value = "";
        }

        function del() {
            outputscreen.value = outputscreen.value.slice(0, -1);
        }

        document.addEventListener('keydown', function(event) {
            const key = event.key;
            if ((key >= '0' && key <= '9') || ['+','-','*','/','.','%'].includes(key)) {
                display(key);
            } else if (key === 'Enter') {
                calculate();
            } else if (key === 'Backspace') {
                del();
            } else if (key === 'Escape') {
                clearScreen();
            }
        });
    </script>
</body>
</html>
